<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>maruf.com | Future Ideas Network</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-body: #e0e6ed;
            --bg-glass: rgba(255, 255, 255, 0.6);
            --bg-glass-solid: rgba(255, 255, 255, 0.9);
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --border-glass: rgba(255, 255, 255, 0.3);
            --accent: #6d28d9;
            --accent-glow: rgba(109, 40, 217, 0.3);
            --shadow-glass: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
            --blur: blur(12px);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.dark {
            --bg-body: #070a13;
            --bg-glass: rgba(15, 23, 42, 0.6);
            --bg-glass-solid: rgba(15, 23, 42, 0.9);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-glass: rgba(255, 255, 255, 0.08);
            --accent: #a78bfa;
            --accent-glow: rgba(167, 139, 250, 0.4);
            --shadow-glass: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-body);
            color: var(--text-primary);
            font-family: 'SF Pro Display', system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            transition: background-color 0.5s ease;
        }

        #particles-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }

        .particle {
            position: absolute;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0));
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(1px);
            border-radius: 4px;
            pointer-events: none;
        }

        .app-header {
            position: sticky; top: 0; z-index: 100;
            background: var(--bg-glass);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border-bottom: 1px solid var(--border-glass);
            padding: 12px 25px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: var(--shadow-glass);
        }

        .logo {
            font-size: 1.8rem; font-weight: 800;
            background: linear-gradient(90deg, #6d28d9, #ec4899, #6d28d9);
            background-size: 200% auto;
            -webkit-background-clip: text; background-clip: text;
            color: transparent;
            letter-spacing: -1px;
            animation: gradientLogo 4s linear infinite;
        }

        @keyframes gradientLogo { to { background-position: 200% center; } }

        .header-center { flex: 1; max-width: 400px; margin: 0 20px; }

        .search-wrapper { position: relative; display: flex; align-items: center; }

        .search-input {
            width: 100%; padding: 10px 15px 10px 40px;
            border-radius: 12px;
            border: 1px solid var(--border-glass);
            background: rgba(0,0,0,0.05);
            color: var(--text-primary);
            transition: var(--transition);
        }
        body.dark .search-input { background: rgba(255,255,255,0.05); }

        .search-input:focus {
            background: var(--bg-glass-solid);
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .search-icon { position: absolute; left: 15px; color: var(--text-secondary); opacity: 0.7; }

        .header-actions { display: flex; align-items: center; gap: 10px; }

        .icon-btn {
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            color: var(--text-primary);
            width: 40px; height: 40px; border-radius: 12px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: var(--transition);
        }

        .icon-btn:hover {
            transform: translateY(-2px);
            background: var(--bg-glass-solid);
            border-color: var(--accent);
            color: var(--accent);
        }

        .posts-grid {
            max-width: 700px; margin: 30px auto;
            padding: 0 20px;
            display: flex; flex-direction: column; gap: 25px;
        }

        .post-card {
            background: var(--bg-glass);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            border: 1px solid var(--border-glass);
            box-shadow: var(--shadow-glass);
            overflow: hidden;
            animation: postAppear 0.5s ease-out;
        }

        @keyframes postAppear {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .post-header { padding: 20px 20px 10px; }
        .post-title { font-size: 1.4rem; font-weight: 700; color: var(--text-primary); }
        .post-meta { font-size: 0.75rem; color: var(--text-secondary); margin-top: 5px; }

        .post-content { padding: 10px 20px 15px; color: var(--text-primary); opacity: 0.9; line-height: 1.6; }

        .post-image-wrap { width: 100%; padding: 0 20px 20px; }
        .post-image {
            width: 100%; max-height: 400px;
            border-radius: 16px; object-fit: cover;
            border: 1px solid var(--border-glass);
        }

        @media (max-width: 600px) {
            .app-header { padding: 10px 15px; }
            .logo { font-size: 1.5rem; }
            .header-center { margin: 0 10px; }
            .posts-grid { margin: 15px auto; padding: 0 10px; }
        }
    </style>
</head>
<body>

<div id="particles-bg"></div>

<header class="app-header">
    <div class="logo">maruf.com</div>
    
    <div class="header-center">
        <div class="search-wrapper">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="searchInput" class="search-input" placeholder="Поиск по проектам...">
        </div>
    </div>
    
    <div class="header-actions">
        <button id="themeToggleBtn" class="icon-btn"><i class="fas fa-moon"></i></button>
    </div>
</header>

<main id="postsContainer" class="posts-grid">
    </main>

<script>

    const projects = [
        {
            id: 1,
            title: "Внимание! ⚠️",
            text: "Мы не собираем данные пользователей, весь контент доступен без рекламы, проект работает даже при слабом сигнале сети.",
            image: "https://sun9-23.userapi.com/s/v1/ig2/bH0OiYHxl_IFbW2zlS4xnHraWPYAPsLRL-Y2JHOKnT1E4e7pfU13n3Rgi4T4aFVLjh76UApY2Hh5hsT36YTdEx7N.jpg?quality=95&as=32x9,48x14,72x21,108x31,160x46,240x69,360x104,480x139,540x156,640x185,720x208,1080x312,1280x370,1440x416,1856x536&from=bu&cs=1280x0",
            date: "28 Мар 2026"
        },
    ];

    // --- ЛОГИКА ОТОБРАЖЕНИЯ ---
    const container = document.getElementById('postsContainer');
    const searchInput = document.getElementById('searchInput');

    function render(filter = "") {
        container.innerHTML = '';
        const filtered = projects.filter(p => 
            p.title.toLowerCase().includes(filter.toLowerCase()) || 
            p.text.toLowerCase().includes(filter.toLowerCase())
        );

        if (filtered.length === 0) {
            container.innerHTML = `<div style="text-align:center; opacity:0.5; padding:50px;">Ничего не найдено</div>`;
            return;
        }

        filtered.forEach(post => {
            const card = document.createElement('div');
            card.className = 'post-card';
            card.innerHTML = `
                <div class="post-header">
                    <div class="post-title">${post.title}</div>
                    <div class="post-meta"><i class="far fa-calendar-alt"></i> ${post.date}</div>
                </div>
                <div class="post-content">${post.text}</div>
                ${post.image ? `<div class="post-image-wrap"><img src="${post.image}" class="post-image" alt="image"></div>` : ''}
            `;
            container.appendChild(card);
        });
    }

    // Поиск
    searchInput.addEventListener('input', (e) => render(e.target.value));

    // Тема
    const themeBtn = document.getElementById('themeToggleBtn');
    themeBtn.addEventListener('click', () => {
        document.body.classList.toggle('dark');
        const isDark = document.body.classList.contains('dark');
        localStorage.setItem('m_theme', isDark ? 'dark' : 'light');
        themeBtn.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    });

    // Инициализация темы и частиц
    if (localStorage.getItem('m_theme') === 'dark') {
        document.body.classList.add('dark');
        themeBtn.innerHTML = '<i class="fas fa-sun"></i>';
    }

    function createParticles() {
        const bg = document.getElementById('particles-bg');
        for (let i = 0; i < 20; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 40 + 10;
            p.style.width = size + 'px';
            p.style.height = size + 'px';
            p.style.top = Math.random() * 100 + '%';
            p.style.left = Math.random() * 100 + '%';
            p.style.transform = `rotate(${Math.random() * 360}deg)`;
            bg.appendChild(p);
        }
    }

    createParticles();
    render();
</script>
</body>
</html>
